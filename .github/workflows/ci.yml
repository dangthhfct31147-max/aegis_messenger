name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # Rust Backend Tests — runs on every push
  # ============================================================
  test-backend:
    name: Test (Rust ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: ${{ matrix.rust }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --no-fail-fast

  # ============================================================
  # Security Baseline — dependency and secret checks
  # ============================================================
  security:
    name: Security Baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Desktop App Build — runs on every push
  # ============================================================
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux (x64)
            os: ubuntu-24.04
            runner: ubuntu-24.04
            artifact_name: aegis-messenger-linux-x64
          - platform: macOS (Apple Silicon)
            os: macos-14
            runner: macos-14
            artifact_name: aegis-messenger-macos-arm64
          - platform: macOS (Intel)
            os: macos-13
            runner: macos-13
            artifact_name: aegis-messenger-macos-x64
          - platform: Windows (x64)
            os: windows-latest
            runner: windows-latest
            artifact_name: aegis-messenger-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux dependencies
        if: runner == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

  # ============================================================
  # Release — creates draft release on GitHub
  # ============================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            artifacts/*.deb
            artifacts/*.AppImage
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/aegis-desktop
